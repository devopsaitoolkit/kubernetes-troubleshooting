name: "➕ Request a new error page"
description: Suggest a Kubernetes error that should be documented.
title: "[new] <error message or name>"
labels: ["documentation", "new-error", "help wanted"]
body:
  - type: input
    id: error
    attributes:
      label: Error message or name
      placeholder: 'Failed to pull image ... rpc error: code = Unknown'
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Subsystem
      options:
        - pods
        - deployments
        - daemonsets
        - statefulsets
        - jobs
        - cronjobs
        - nodes
        - networking
        - ingress
        - services
        - storage
        - persistent-volumes
        - persistent-volume-claims
        - rbac
        - security
        - helm
        - cert-manager
        - monitoring
        - autoscaling
        - api-server
        - etcd
        - scheduler
        - controller-manager
        - admission
        - kubelet
        - container-runtime
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: When does it happen?
      description: What were you doing? What did you see? Any logs/events (redacted)?
  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to write it?
      options:
        - label: I'm willing to open a PR for this page (we'll help review).
