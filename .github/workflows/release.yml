name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build fresh search index
        run: python tools/build_index.py
      - name: Stats
        id: stats
        run: |
          COUNT=$(python - <<'PY'
          import json
          print(json.load(open("tools/index.json"))["count"])
          PY
          )
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Documented Kubernetes production errors in this release:
            **${{ steps.stats.outputs.count }}**.

            See `CHANGELOG.md` for details.
          files: |
            tools/index.json
