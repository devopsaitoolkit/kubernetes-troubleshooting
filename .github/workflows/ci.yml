name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Python tests + index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests (stdlib only)
        run: python -m unittest discover -s tools/tests -v
      - name: Verify search index is up to date
        run: python tools/build_index.py --check

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  spellcheck:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "**/*.md"
          config: ".cspell.json"
          incremental_files_only: false
