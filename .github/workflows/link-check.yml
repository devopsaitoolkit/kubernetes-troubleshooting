name: Link check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC — catches link rot
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/markdown-link-check.json"
          folder-path: "docs,."
          max-depth: 4
