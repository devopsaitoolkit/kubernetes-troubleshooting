# =============================================================================
# THROWAWAY / TEST CLUSTER ONLY — DO NOT APPLY TO PRODUCTION
# =============================================================================
# Purpose: intentionally reproduce an OOMKilled container.
#
# This Pod sets a deliberately tiny memory limit and then allocates more than
# that limit. The kernel's cgroup OOM killer terminates the container; the Pod
# shows Last State: Terminated, Reason: OOMKilled (exit code 137).
#
# Learn the fix here:
#   ../docs/errors/pods/oomkilled.md
#
# Try it:
#   kubectl apply -f oomkilled-low-memory-limit.yaml
#   kubectl get pod oomkilled-demo -w
#   kubectl describe pod oomkilled-demo   # look for Reason: OOMKilled
#
# Clean up:
#   kubectl delete -f oomkilled-low-memory-limit.yaml
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: oomkilled-demo
  labels:
    app: oomkilled-demo
    purpose: throwaway-test
spec:
  restartPolicy: Always
  containers:
    - name: memory-hog
      image: polinux/stress
      # Allocate ~250Mi while the limit is only 32Mi -> guaranteed OOMKill.
      command: ["stress"]
      args:
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "250M"
        - "--vm-hang"
        - "1"
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "32Mi"
